<script type="module">
    // 1. 初始化 Supabase
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    // --- 请在此处填写你的 Supabase 信息 ---
    const SUPABASE_URL = 'https://你的项目ID.supabase.co'
    const SUPABASE_KEY = '你的ANON_KEY'
    // ------------------------------------

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // 2. 统计函数：记录功能使用率
    async function trackUsage(featureName) {
        try {
            await supabase.rpc('increment_usage', { row_id: featureName });
        } catch (e) { console.error('Stats Error:', e); }
    }

    // 3. 加载广告内容
    async function loadAds() {
        const { data, error } = await supabase.from('ads_config').select('*').order('id', { ascending: true });
        if (data && data.length >= 2) {
            document.getElementById('ad-img-1').src = data[0].img_url;
            document.getElementById('ad-link-1').href = data[0].link_url;
            document.getElementById('ad-img-2').src = data[1].img_url;
            document.getElementById('ad-link-2').href = data[1].link_url;
        }
    }

    // 4. 提交留言
    window.submitMessage = async () => {
        const content = document.getElementById('msg-input').value;
        if (!content) return alert('请输入内容');
        const { error } = await supabase.from('user_messages').insert([{ content }]);
        if (!error) {
            alert('WLB 已收到您的反馈！');
            document.getElementById('msg-input').value = '';
        }
    };

    // 5. 挂载统计到按钮逻辑中 (以生成PDF为例)
    // 在原本的 generatePDF() 结尾处调用： await trackUsage('img-to-pdf');
    // 在 mergePDFs() 结尾处调用： await trackUsage('merge-pdf');
    // 在 pdfToImagesZip() 结尾处调用： await trackUsage('pdf-convert');

    // 页面加载时初始化
    loadAds();
</script>
