<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WLB工具包 · 云端后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container, .dashboard-container { background: white; border-radius: 32px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .dashboard-container { max-width: 1400px; padding: 0; overflow: hidden; }
        .login-container { text-align: center; }
        .login-logo { font-size: 48px; margin-bottom: 16px; color: #2c7da0; }
        .input-group { margin: 20px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 28px; font-size: 15px; }
        .login-btn { width: 100%; background: #2c7da0; color: white; border: none; padding: 12px; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #e53e3e; margin-top: 12px; font-size: 14px; }
        .success-msg { color: #10b981; margin-top: 12px; font-size: 14px; }
        .dashboard-header { background: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; }
        .dashboard-content { padding: 32px; background: #f1f5f9; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 800; color: #2c7da0; }
        .config-section, .messages-section { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; }
        .form-group input { width: 100%; padding: 10px 16px; border: 1px solid #cbd5e1; border-radius: 28px; }
        .save-btn { background: #2c7da0; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .message-item { background: #f8fafc; border-left: 4px solid #f4b942; padding: 12px; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .delete-msg { background: #fee2e2; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .info-tip { background: #eef2ff; padding: 12px; border-radius: 16px; margin-top: 16px; font-size: 13px; }
        .status-badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 10px; }
        .refresh-btn { background: #e2e8f0; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginPanel" class="login-container">
        <div class="login-logo"><i class="fas fa-chalkboard-user"></i></div>
        <h2>WLB 云端后台</h2>
        <p style="color: #64748b; margin: 8px 0 20px;">全局数据管理</p>
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="wilink">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="wlb0404">
        </div>
        <button class="login-btn" id="doLoginBtn">登录后台</button>
        <div id="loginError" class="error-msg"></div>
        <div id="loginStatus" class="info-tip" style="margin-top: 20px; text-align: left;">
            <i class="fas fa-info-circle"></i> 正在连接数据库...<br>
            <span id="dbStatus">检测中...</span>
        </div>
    </div>

    <!-- 后台主界面 -->
    <div id="dashboardPanel" class="dashboard-container" style="display: none;">
        <div class="dashboard-header">
            <h2><i class="fas fa-chart-line"></i> WLB 云端管理后台</h2>
            <div><span>管理员: wilink</span>
            <button class="logout-btn" id="logoutBtn">退出</button></div>
        </div>
        <div class="dashboard-content">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-number" id="statPdfCount">-</div><div>图片打包PDF</div></div>
                <div class="stat-card"><div class="stat-number" id="statMergeCount">-</div><div>合并PDF</div></div>
                <div class="stat-card"><div class="stat-number" id="statImgCount">-</div><div>PDF转图片</div></div>
                <div class="stat-card"><div class="stat-number" id="lastActiveTime">-</div><div>最后活跃</div></div>
            </div>

            <div class="config-section">
                <div class="section-title">📢 远程广告推送 <span class="status-badge">全局生效</span></div>
                <div class="form-group"><label>广告文字</label><input type="text" id="adLinkText"></div>
                <div class="form-group"><label>广告链接</label><input type="url" id="adLinkUrl"></div>
                <button class="save-btn" id="saveAdConfigBtn">推送到所有用户</button>
                <div class="preview-box" style="margin-top: 16px; background:#fef7e0; padding:12px; border-radius:16px; text-align:center;">
                    <a href="#" id="previewAdLink" target="_blank" style="color:#2c7da0;">预览广告</a>
                </div>
            </div>

            <div class="messages-section">
                <div class="section-title">💬 全局留言板 
                    <button id="refreshMessagesBtn" class="refresh-btn">刷新</button>
                    <button id="clearAllMessagesBtn" class="refresh-btn" style="background:#fee2e2;">清空全部</button>
                </div>
                <div id="adminMessagesList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = "https://kfqgwpgdziucqzivoryh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Af-oWa-CrwGSO-ctc79wtQ_nD060jw1";
        const ADMIN_USER = "wilink";
        const ADMIN_PASS = "wlb0404";
        
        let supabase;
        let dbConnected = false;
        
        // 初始化并测试数据库连接
        async function initSupabase() {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // 测试连接：尝试读取 stats 表
                const { data, error } = await supabase.from('stats').select('*').limit(1);
                
                if (error) {
                    console.error('数据库连接失败:', error);
                    document.getElementById('dbStatus').innerHTML = `❌ 连接失败: ${error.message}<br>请检查 Supabase 表是否已创建`;
                    return false;
                }
                
                if (!data || data.length === 0) {
                    document.getElementById('dbStatus').innerHTML = `⚠️ 连接成功，但 stats 表为空<br>请在 Supabase SQL Editor 中执行建表语句`;
                    return true; // 连接成功但无数据
                }
                
                document.getElementById('dbStatus').innerHTML = `✅ 数据库连接成功！已连接到 Supabase`;
                return true;
                
            } catch (err) {
                console.error('初始化失败:', err);
                document.getElementById('dbStatus').innerHTML = `❌ 连接异常: ${err.message}`;
                return false;
            }
        }
        
        async function loadStats() {
            if (!supabase) return;
            const { data, error } = await supabase.from('stats').select('*').limit(1);
            if (error) { console.error('加载统计失败:', error); return; }
            if (data && data.length) {
                document.getElementById('statPdfCount').innerText = data[0].pdf_from_images || 0;
                document.getElementById('statMergeCount').innerText = data[0].merge_pdf_count || 0;
                document.getElementById('statImgCount').innerText = data[0].pdf_to_image_count || 0;
                document.getElementById('lastActiveTime').innerText = data[0].last_active ? new Date(data[0].last_active).toLocaleString() : '-';
            }
        }
        
        async function loadMessages() {
            if (!supabase) return;
            const { data, error } = await supabase.from('messages').select('*').order('time', { ascending: false });
            if (error) { console.error('加载留言失败:', error); return; }
            const container = document.getElementById('adminMessagesList');
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">暂无留言</div>';
                return;
            }
            let html = '';
            data.forEach(msg => {
                html += `<div class="message-item">
                            <div>
                                <div style="font-size:12px; color:#94a3b8;">${new Date(msg.time).toLocaleString()}</div>
                                <div>${escapeHtml(msg.text)}</div>
                            </div>
                            <button class="delete-msg" data-id="${msg.id}">删除</button>
                         </div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.delete-msg').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = parseInt(btn.dataset.id);
                    await supabase.from('messages').delete().eq('id', id);
                    loadMessages();
                });
            });
        }
        
        async function loadAdConfig() {
            if (!supabase) return;
            const { data, error } = await supabase.from('ad_config').select('link_text, link_url').order('id', { ascending: false }).limit(1);
            if (error) { console.error('加载广告失败:', error); return; }
            if (data && data.length) {
                document.getElementById('adLinkText').value = data[0].link_text;
                document.getElementById('adLinkUrl').value = data[0].link_url;
                document.getElementById('previewAdLink').innerText = data[0].link_text;
                document.getElementById('previewAdLink').href = data[0].link_url;
            }
        }
        
        async function saveAdConfig() {
            const newText = document.getElementById('adLinkText').value.trim();
            const newUrl = document.getElementById('adLinkUrl').value.trim();
            if (!newText) { alert('广告文字不能为空'); return; }
            const { error } = await supabase.from('ad_config').update({ 
                link_text: newText, 
                link_url: newUrl || '#', 
                updated_at: new Date() 
            }).eq('id', 1);
            if (error) { alert('保存失败: ' + error.message); return; }
            alert('✅ 广告已推送到所有用户！');
            loadAdConfig();
        }
        
        async function clearAllMessages() {
            if (confirm('⚠️ 确定清空所有留言吗？不可恢复！')) {
                await supabase.from('messages').delete().neq('id', 0);
                loadMessages();
                alert('✅ 所有留言已清空');
            }
        }
        
        function escapeHtml(str) { 
            if(!str) return ''; 
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
        }
        
        function checkAuth() {
            const isLogged = sessionStorage.getItem('wlb_admin_logged');
            if (isLogged === 'true') { 
                showDashboard(); 
            } else { 
                showLogin(); 
            }
        }
        
        function showLogin() {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('dashboardPanel').style.display = 'none';
        }
        
        function showDashboard() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            loadStats(); 
            loadMessages(); 
            loadAdConfig();
            if (window.dashboardInterval) clearInterval(window.dashboardInterval);
            window.dashboardInterval = setInterval(() => { loadStats(); loadMessages(); }, 5000);
        }
        
        function logout() { 
            sessionStorage.removeItem('wlb_admin_logged'); 
            if(window.dashboardInterval) clearInterval(window.dashboardInterval); 
            showLogin(); 
        }
        
        async function attemptLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                // 先测试数据库连接
                const connected = await initSupabase();
                if (connected !== false) {
                    sessionStorage.setItem('wlb_admin_logged', 'true');
                    document.getElementById('loginError').innerText = '';
                    showDashboard();
                } else {
                    document.getElementById('loginError').innerText = '数据库连接失败，请检查 Supabase 配置';
                }
            } else {
                document.getElementById('loginError').innerText = '用户名或密码错误';
            }
        }
        
        // 页面加载时测试连接
        window.addEventListener('load', () => {
            initSupabase();
        });
        
        document.getElementById('doLoginBtn').addEventListener('click', attemptLogin);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('saveAdConfigBtn').addEventListener('click', saveAdConfig);
        document.getElementById('refreshMessagesBtn').addEventListener('click', loadMessages);
        document.getElementById('clearAllMessagesBtn').addEventListener('click', clearAllMessages);
        document.getElementById('loginPassword').addEventListener('keypress', e => { if(e.key === 'Enter') attemptLogin(); });
        
        checkAuth();
    </script>
</body>
</html>
