<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WLB工具包 · 云端后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: white; border-radius: 32px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center; }
        .login-container h2 { font-size: 28px; margin-bottom: 8px; color: #1e3a5f; }
        .login-logo { font-size: 48px; margin-bottom: 16px; color: #2c7da0; }
        .input-group { margin: 20px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; }
        .input-group input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 28px; font-size: 15px; }
        .input-group input:focus { outline: none; border-color: #2c7da0; }
        .login-btn { width: 100%; background: #2c7da0; color: white; border: none; padding: 12px; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #1f6392; }
        .error-msg { color: #e53e3e; margin-top: 12px; }
        .dashboard-container { width: 100%; max-width: 1400px; background: #f1f5f9; border-radius: 32px; overflow: hidden; }
        .dashboard-header { background: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border-bottom: 2px solid #e2e8f0; }
        .dashboard-header h1 { font-size: 24px; color: #0f2b3d; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .dashboard-content { padding: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: white; border-radius: 24px; padding: 24px; }
        .stat-card i { font-size: 32px; color: #2c7da0; margin-bottom: 12px; }
        .stat-number { font-size: 36px; font-weight: 800; color: #1e293b; }
        .stat-label { color: #64748b; margin-top: 8px; }
        .config-section, .messages-section { background: white; border-radius: 24px; padding: 28px; margin-bottom: 32px; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; flex-wrap: wrap; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 28px; }
        .save-btn { background: #2c7da0; color: white; border: none; padding: 10px 28px; border-radius: 40px; cursor: pointer; }
        .preview-box { background: #fef7e0; padding: 16px; border-radius: 20px; margin-top: 16px; text-align: center; }
        .message-list { max-height: 450px; overflow-y: auto; }
        .message-item { background: #f8fafc; border-left: 4px solid #f4b942; padding: 16px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
        .message-time { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        .delete-msg { background: #fee2e2; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; color: #dc2626; }
        .empty-msg { text-align: center; padding: 50px; color: #94a3b8; }
        .refresh-btn { background: #e2e8f0; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; margin-left: 12px; }
        .status-badge { background: #10b981; color: white; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .info-tip { background: #eef2ff; padding: 12px 16px; border-radius: 20px; margin-top: 16px; font-size: 13px; }
        @media (max-width: 768px) { .dashboard-content { padding: 20px; } }
    </style>
</head>
<body>
    <div id="loginPanel" class="login-container">
        <div class="login-logo"><i class="fas fa-chalkboard-user"></i></div>
        <h2>WLB 云端后台</h2>
        <p style="color: #64748b; margin-bottom: 24px;">全局数据管理 · 所有用户同步</p>
        <div class="input-group"><label><i class="fas fa-user"></i> 用户名</label><input type="text" id="loginUsername" placeholder="wilink"></div>
        <div class="input-group"><label><i class="fas fa-lock"></i> 密码</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
        <button class="login-btn" id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> 登录后台</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="dashboardPanel" class="dashboard-container" style="display: none;">
        <div class="dashboard-header">
            <h1><i class="fas fa-tachometer-alt"></i> WLBpdf工具包 · 云端管理后台</h1>
            <div><span><i class="fas fa-user-shield"></i> 管理员: wilink</span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button></div>
        </div>
        <div class="dashboard-content">
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-images"></i><div class="stat-number" id="statPdfCount">0</div><div class="stat-label">图片打包PDF总次数</div></div>
                <div class="stat-card"><i class="fas fa-file-pdf"></i><div class="stat-number" id="statMergeCount">0</div><div class="stat-label">合并PDF总次数</div></div>
                <div class="stat-card"><i class="fas fa-camera"></i><div class="stat-number" id="statImgCount">0</div><div class="stat-label">PDF转图片总次数</div></div>
                <div class="stat-card"><i class="fas fa-calendar-alt"></i><div class="stat-number" id="lastActiveTime">-</div><div class="stat-label">最后活跃时间</div></div>
            </div>

            <div class="config-section">
                <div class="section-title"><i class="fas fa-ad"></i> 远程广告推送 <span class="status-badge"><i class="fas fa-globe"></i> 全局生效</span></div>
                <div class="form-group"><label>广告链接文字</label><input type="text" id="adLinkText" placeholder="广告文字"></div>
                <div class="form-group"><label>广告跳转URL</label><input type="url" id="adLinkUrl" placeholder="https://"></div>
                <button class="save-btn" id="saveAdConfigBtn"><i class="fas fa-cloud-upload-alt"></i> 推送到所有用户</button>
                <div class="preview-box"><i class="fas fa-eye"></i> 预览：<br><a href="#" id="previewAdLink" target="_blank" style="color:#2c7da0;">加载中...</a></div>
                <div class="info-tip"><i class="fas fa-info-circle"></i> 修改后所有用户的广告将在30秒内自动更新</div>
            </div>

            <div class="messages-section">
                <div class="section-title"><i class="fas fa-envelope"></i> 全局留言板 <button id="refreshMessagesBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> 刷新</button><button id="clearAllMessagesBtn" class="refresh-btn" style="background:#fee2e2; color:#dc2626;"><i class="fas fa-trash-alt"></i> 清空所有留言</button></div>
                <div id="adminMessagesList" class="message-list"><div class="empty-msg">加载中...</div></div>
                <div class="info-tip"><i class="fas fa-lock"></i> 所有用户留言实时同步，可删除或一键清空</div>
            </div>
        </div>
    </div>

    <script>
        //
