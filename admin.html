<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    const SUPABASE_URL = 'https://你的项目ID.supabase.co'
    const SUPABASE_KEY = '你的ANON_KEY'
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // 加载所有管理数据
    async function refreshAdminData() {
        // A. 加载统计
        const { data: stats } = await supabase.from('usage_stats').select('*');
        if (stats) {
            const getVal = (name) => stats.find(s => s.feature_name === name)?.count || 0;
            document.getElementById('stat-1').innerText = getVal('img-to-pdf');
            document.getElementById('stat-2').innerText = getVal('merge-pdf');
            document.getElementById('stat-3').innerText = getVal('pdf-convert');
        }

        // B. 加载广告配置
        const { data: ads } = await supabase.from('ads_config').select('*').order('id', { ascending: true });
        if (ads && ads.length >= 2) {
            document.getElementById('ad1-img').value = ads[0].img_url;
            document.getElementById('ad1-link').value = ads[0].link_url;
            document.getElementById('ad2-img').value = ads[1].img_url;
            document.getElementById('ad2-link').value = ads[1].link_url;
        }

        // C. 加载留言
        const { data: msgs } = await supabase.from('user_messages').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('message-list');
        list.innerHTML = msgs.length ? msgs.map(m => `
            <div class="border-b border-[#f1ece4] py-3 flex justify-between items-center">
                <p class="text-xs text-[#5d574f]">${m.content}</p>
                <span class="text-[9px] opacity-30">${new Date(m.created_at).toLocaleString()}</span>
            </div>
        `).join('') : '<p class="text-xs opacity-30 italic">暂无留言</p>';
    }

    // 保存广告修改
    window.saveAds = async () => {
        const updates = [
            { id: 1, img_url: document.getElementById('ad1-img').value, link_url: document.getElementById('ad1-link').value },
            { id: 2, img_url: document.getElementById('ad2-img').value, link_url: document.getElementById('ad2-link').value }
        ];
        
        for (const item of updates) {
            await supabase.from('ads_config').update(item).eq('id', item.id);
        }
        alert('广告内容已实时同步至前端！');
    };

    refreshAdminData();
</script>
